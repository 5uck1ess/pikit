name: Code Review
description: Two-pass code review — deep analysis followed by a concise summary

steps:
  - id: analyze
    model: smart
    prompt: |
      Review the following code or changes: {{input}}

      Do a thorough analysis:
      - Correctness: bugs, off-by-one errors, null handling, race conditions
      - Security: injection, auth issues, data exposure
      - Performance: unnecessary allocations, N+1 queries, missing indexes
      - Maintainability: naming, complexity, duplication
      - Missing tests or edge cases

      Be specific. Reference line numbers. Don't flag style nitpicks.

  - id: summarize
    model: fast
    prompt: |
      Here is a detailed code review:

      {{analyze}}

      Summarize into a short, actionable list:
      - Critical issues (must fix)
      - Suggestions (should consider)
      - Verdict: approve, request changes, or needs discussion
