name: Self-Test
description: Run tests, fix failures, repeat until all pass

steps:
  - id: baseline
    model: fast
    prompt: |
      Run the project's test suite and report results.
      {{input}}

      Show which tests pass, which fail, and the error messages.

  - id: fix
    model: smart
    prompt: |
      Test results:

      {{baseline}}

      Fix the failing tests. The bug might be in the test or the code under test.
      Make targeted changes — don't refactor unrelated code.

      Run tests again after fixing. If all pass, say "ALL_PASSING".
    loop:
      max: 8
      until: ALL_PASSING

  - id: summary
    model: fast
    prompt: |
      Test fix session complete.

      Starting state:
      {{baseline}}

      Final state:
      {{fix}}

      Summarize what was fixed and how many iterations it took.
